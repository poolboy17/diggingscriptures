[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--include=optional --include=dev"

# Image optimization
[images]
  remote_images = ["https://media-cdn\\.tripadvisor\\.com/.*", "https://images\\.unsplash\\.com/.*"]

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/.netlify/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Vary = "Accept"

# 301 redirects — old WordPress URLs still indexed by Google
[[redirects]]
  from = "/the-ultimate-beginners-guide-to-biblical-archaeology/"
  to = "/research/biblical-archaeology/the-ultimate-beginners-guide-to-biblical-archaeology/"
  status = 301

[[redirects]]
  from = "/were-the-new-testament-books-written-in-hebrew/"
  to = "/research/scripture/were-the-new-testament-books-written-in-hebrew/"
  status = 301

[[redirects]]
